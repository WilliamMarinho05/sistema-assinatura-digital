<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Assinador Digital</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>✒️ Sistema de Assinatura Digital</h1>
    <hr>

    <div class="card">
        <h2>1. Cadastro</h2>
        <input type="text" id="reg-user" placeholder="Nome de usuário (ex: yara)">
        <button onclick="cadastrar()">Gerar Par de Chaves e Cadastrar</button>
        <p id="reg-msg"></p>
    </div>

    <div class="card">
        <h2>2. Área de Assinatura</h2>
        <input type="text" id="sign-user" placeholder="Seu usuário">
        <textarea id="sign-text" rows="4" placeholder="Digite o texto que deseja assinar..."></textarea>
        <button onclick="assinar()">Assinar Texto</button>
        <div id="sign-result"></div>
    </div>

    <div class="card">
        <h2>3. Verificação Pública</h2>
        <input type="number" id="verify-id" placeholder="ID da Assinatura">
        <button onclick="verificar()">Verificar Integridade</button>
        <div id="verify-result"></div>
    </div>

    <script>
        async function cadastrar() {
            const user = document.getElementById('reg-user').value;
            const res = await fetch('/cadastro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user })
            });
            const data = await res.json();
            document.getElementById('reg-msg').innerText = data.message || data.error;
        }

        async function assinar() {
            const user = document.getElementById('sign-user').value;
            const text = document.getElementById('sign-text').value;
            const res = await fetch('/assinar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, texto: text })
            });
            const data = await res.json();
            document.getElementById('sign-result').innerHTML = 
                `<p style="color: green">Sucesso! ID da Assinatura: <strong>${data.id}</strong></p>`;
        }

        async function verificar() {
            const id = document.getElementById('verify-id').value;
            const res = await fetch(`/verify/${id}`);
            const data = await res.json();
            const color = data.status === 'VÁLIDA' ? 'green' : 'red';
            document.getElementById('verify-result').innerHTML = `
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px">
                    <p>Status: <strong style="color: ${color}">${data.status}</strong></p>
                    <p>Signatário: ${data.signatario || '---'}</p>
                    <p>Algoritmo: <strong>${data.algoritmo}</strong></p>
                    <p>Data: ${data.data || '---'}</p>
                </div>`;
        }
    </script>
</body>
</html>
