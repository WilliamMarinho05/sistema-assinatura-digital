<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Assinador RSA</title>

    <!-- Estilo global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Estilo específico do cadastro -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="container-auth">
            
            <div class="card">
                <div class="auth-header">
                    <h1>Criar Conta</h1>
                    <p>Acesse sua área preenchendo os dados abaixo</p>
                </div>

                <div class="form-group">
                    <label for="cad-username">Usuário</label>
                    <input type="text" id="cad-username" placeholder="Digite seu usuário">
                </div>

                <div class="form-group">
                    <label for="cad-senha">Senha</label>
                    <input type="password" id="cad-senha" placeholder="Digite sua senha">
                </div>

                <div class="form-group">
                    <label for="cad-senha-confirm">Confirmar Senha</label>
                    <input type="password" id="cad-senha-confirm" placeholder="Repita a senha">
                </div>

                <button class="btn btn-primary" onclick="criarConta()">Criar Conta</button>

                <p id="cad-msg"></p>

                <div class="auth-footer">
                    <span>Opções</span>
                    <div class="grid-actions">
                        <a href="/" class="btn btn-outline">Voltar ao Login</a>
                        <a href="/verificar" class="btn btn-outline btn-success-outline">Validar Assinatura</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
async function criarConta() {
    const username = document.getElementById('cad-username').value;
    const senha = document.getElementById('cad-senha').value;
    const confirm = document.getElementById('cad-senha-confirm').value;
    const msg = document.getElementById('cad-msg');

    if (!username || !senha || !confirm) {
        msg.innerText = "⚠️ Preencha todos os campos.";
        msg.style.color = "#e11d48";
        return;
    }

    if (senha !== confirm) {
        msg.innerText = "⚠️ Senhas não coincidem.";
        msg.style.color = "#e11d48";
        return;
    }

    try {
        const response = await fetch('/cadastro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, senha: senha })
        });

        const data = await response.json();

        if (response.ok) {
            msg.innerText = "✅ Conta criada com sucesso! Redirecionando...";
            msg.style.color = "var(--success-green)";
            setTimeout(() => window.location.href = "/", 2000);
        } else {
            msg.innerText = "❌ " + (data.error || "Erro ao criar usuário.");
            msg.style.color = "#e11d48";
        }
    } catch (error) {
        msg.innerText = "❌ Falha na conexão com o servidor.";
        msg.style.color = "#e11d48";
    }
}
</script>

</body>
</html>
