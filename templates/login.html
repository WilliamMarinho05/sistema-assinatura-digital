<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Assinador Digital</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="container-auth">
            <div class="card">
                <div class="auth-header">
                    <h1>Assinador RSA</h1>
                    <p style= "color: #64748b; margin-bottom: 2rem; font-size: 0.9rem;">
                        Acesse sua área restrita para assinar documentos ou utilize as ferramentas públicas abaixo.
                    </p>
                </div>

                <div class="form-group">
                    <label for="login-user">Usuário</label>
                    <input type="text" id="login-user" placeholder="Digite seu nome de usuário">
                </div>
                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="Digite sua senha">
                </div>

                <button class="btn btn-primary" onclick="fazerLogin()">Entrar no Sistema</button>
                <p id="login-msg" style="text-align: center; margin-top: 10px; font-size: 0.85rem; min-height: 20px;"></p>

                <div style="display: flex; align-items: center; margin: 2rem 0;">
                    <hr style="flex: 1; border: 0; border-top: 1px solid #e2e8f0;">
                    <span style="margin: 0 10px; color: #94a3b8; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Outras Opções</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid #e2e8f0;">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <a href="/pg-cadastro" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.6rem;">
                        Criar Minha Conta
                    </a>
                    <a href="/verificar" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.6rem; border-color: var(--success-green); color: var(--success-green);">
                        Validar Assinatura
                    </a>
                </div>

                <p style="text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #cbd5e1;">
                    Criptografia SHA-256 & RSA-2048 bits
                </p>
            </div>
        </div>
    </div>

    <script>
        async function fazerLogin() {
            const username = document.getElementById('login-user').value;
            const senha = document.getElementById('login-senha').value; // pegar senha
            const msgElement = document.getElementById('login-msg');

            if (!username || !senha) {
                msgElement.innerText = "⚠️ Digite usuário e senha para entrar.";
                msgElement.style.color = "#e11d48";
                return;
            }

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, senha: senha }) // enviar senha
                });

                const data = await response.json();

                if (response.ok) {
                    msgElement.innerText = "✅ Autenticado! Redirecionando...";
                    msgElement.style.color = "var(--success-green)";
                    setTimeout(() => { window.location.href = "/dashboard"; }, 800);
                } else {
                    msgElement.innerText = "❌ " + (data.error || "Usuário não encontrado.");
                    msgElement.style.color = "#e11d48";
                }
            } catch (error) {
                msgElement.innerText = "❌ Falha na conexão com o servidor.";
                msgElement.style.color = "#e11d48";
            }
        }
    </script>
</body>
</html>
